<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#08080c" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>Tour Entry · Stop 0</title>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .getRegistrations()
            .then((registrations) => Promise.all(registrations.map((registration) => registration.unregister())))
            .catch(() => {});
          if ("caches" in window) {
            caches.keys().then((keys) => Promise.all(keys.map((key) => caches.delete(key)))).catch(() => {});
          }
        });
      }
    </script>
    <link rel="icon" href="./icons/icon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow:wght@500;700;800&family=Manrope:wght@500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./entry.css?v=20260412e" />
  </head>
  <body>
    <main class="entry-shell" aria-label="Stop 0 entry page">
      <div id="entryLoadingOverlay" class="entry-loading-overlay" role="status" aria-label="Loading">
        <div class="entry-loading-dots" aria-hidden="true">
          <span class="loading-dot"></span>
          <span class="loading-dot"></span>
          <span class="loading-dot"></span>
        </div>
      </div>

      <section class="entry-hero" aria-label="Stop 0 introduction video">
        <video
          id="entryVideo"
          class="entry-video hidden"
          playsinline
          autoplay
          muted
          preload="auto"
          x-webkit-airplay="deny"
          disableremoteplayback
          aria-label="Stop 0 video"
        ></video>
        <button class="entry-unmute-btn hidden" id="entryUnmuteBtn" type="button" aria-label="音声をオン/オフ">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path id="entryUnmuteIcon" d="M11 5L6 9H2v6h4l5 4V5zM23 9l-6 6M17 9l6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span id="entryUnmuteLabel">音声オン</span>
        </button>
      </section>

      <section class="entry-content" aria-label="Stop 0 description and transcript">
        <h1 id="entryTitle">Welcome</h1>
        <p class="entry-highlight-label" id="entryHighlightLabel" hidden>ハイライト</p>
        <div id="entryHighlight" class="entry-highlight hidden"></div>
        <div id="entryText" class="entry-text"></div>

        <div id="entryGuideGallery" class="entry-guide-gallery hidden" aria-hidden="true">
          <div id="entryGuideTrack" class="entry-guide-track"></div>
          <div id="entryGuideDots" class="entry-guide-dots" aria-label="Guide image indicators"></div>
        </div>
      </section>

      <footer class="entry-footer">
        <div class="entry-actions">
          <button
            id="entryStartBtn"
            class="entry-action-btn is-start"
            type="button"
            aria-label="ガイドを開始"
          >
            ガイド開始
          </button>
        </div>
      </footer>
    </main>

    <script src="./entry.js?v=20260412e"></script>
  </body>
</html>
