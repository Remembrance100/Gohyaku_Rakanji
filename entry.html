<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tour Entry · Stop 0</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow:wght@500;700;800&family=Manrope:wght@500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./entry.css" />
  </head>
  <body>
    <main class="entry-shell" aria-label="Stop 0 entry page">
      <section class="entry-hero" aria-label="Stop 0 introduction video">
        <video
          id="entryVideo"
          class="entry-video hidden"
          playsinline
          muted
          autoplay
          loop
          preload="metadata"
          aria-label="Stop 0 video"
        ></video>
      </section>

      <section class="entry-content" aria-label="Stop 0 description and transcript">
        <h1 id="entryTitle">Welcome</h1>
        <p id="entryHighlight" class="entry-highlight hidden"></p>
        <div id="entryText" class="entry-text"></div>

        <section class="entry-guide-section" aria-label="Guide image section">
          <h2>Guide Image</h2>
          <div class="entry-guide-divider" aria-hidden="true"></div>
          <div id="entryGuideGallery" class="entry-guide-gallery hidden">
            <div id="entryGuideTrack" class="entry-guide-track"></div>
            <div id="entryGuideDots" class="entry-guide-dots" aria-label="Guide image indicators"></div>
          </div>
        </section>
      </section>

      <footer class="entry-footer">
        <div class="entry-actions">
          <button
            id="entryStartBtn"
            class="entry-action-btn is-start"
            type="button"
            aria-label="Start tour from stop 1"
          >
            Start
          </button>
        </div>
      </footer>
    </main>

    <script src="./entry.js"></script>
  </body>
</html>
