<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Memorial Tour Guide · SmartSenior</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow:wght@500;700;800&family=Manrope:wght@500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="site-header" aria-label="Site header">
      <div class="site-header-inner">
        <div class="site-brand">
          <svg class="site-brand-icon" width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
            <circle cx="9" cy="9" r="8" stroke="currentColor" stroke-width="1.2" stroke-opacity="0.5"/>
            <circle cx="9" cy="9" r="3.5" fill="currentColor" fill-opacity="0.45"/>
            <line x1="9" y1="1" x2="9" y2="4" stroke="currentColor" stroke-width="1.2" stroke-opacity="0.45"/>
            <line x1="9" y1="14" x2="9" y2="17" stroke="currentColor" stroke-width="1.2" stroke-opacity="0.45"/>
            <line x1="1" y1="9" x2="4" y2="9" stroke="currentColor" stroke-width="1.2" stroke-opacity="0.45"/>
            <line x1="14" y1="9" x2="17" y2="9" stroke="currentColor" stroke-width="1.2" stroke-opacity="0.45"/>
          </svg>
          <span class="site-brand-name">SmartSenior</span>
        </div>
        <span class="site-badge">Audio Tour</span>
      </div>
    </header>

    <main class="app-shell" id="appShell">
      <div class="app-loading-overlay" id="appLoadingOverlay" role="status" aria-label="Loading content">
        <div class="app-loading-dots" aria-hidden="true">
          <span class="loading-dot"></span>
          <span class="loading-dot"></span>
          <span class="loading-dot"></span>
        </div>
      </div>

      <section class="tour-sheet" aria-label="Tour stops">
        <article class="intro-card">
          <video
            id="introVideo"
            class="intro-video hidden"
            playsinline
            muted
            autoplay
            loop
            controls
            controlslist="nodownload noplaybackrate"
            preload="metadata"
            aria-label="Introduction video"
          ></video>
        </article>
        <div class="stop-list"></div>
      </section>

      <section class="detail-view" aria-label="Stop detail">
        <div class="detail-hero">
          <button class="back-btn" id="backButton" type="button" aria-label="Go back">
            <
          </button>
          <div class="detail-hero-track" id="detailHeroTrack"></div>
          <div
            class="detail-hero-indicators"
            id="detailHeroIndicators"
            aria-label="Image slide indicators"
          ></div>
        </div>

        <header class="detail-strip">
          <p class="detail-number" id="detailNumber">01</p>
          <h2 class="detail-title" id="detailTitle">
            Welcome Gate & Orientation Plaza
          </h2>
        </header>

        <div class="detail-content" id="detailContent">
          <article class="detail-question-block">
            <h3 id="detailQuestion">
              Why was this site chosen as a place of remembrance?
            </h3>
          </article>

          <div class="detail-text" id="detailText"></div>

          <section class="detail-transcript-block" id="detailTranscriptBlock" hidden>
            <h4>トランスクリプト</h4>
            <div class="detail-transcript" id="detailTranscript"></div>
          </section>

          <div class="player-dock">
            <article class="player-card">
              <img
                id="detailThumb"
                class="player-thumb"
                src="https://picsum.photos/id/1040/120/80"
                alt="Stop thumbnail"
              />
              <p id="detailAudioTitle">01 | Welcome Gate & Orientation Plaza</p>
              <button
                class="detail-play-btn"
                id="detailPlayBtn"
                type="button"
                aria-label="Play stop audio"
              >
                ▶
              </button>
            </article>
          </div>
        </div>
      </section>
    </main>

    <section
      class="overlay-modal hidden"
      id="mapPreviewModal"
      role="dialog"
      aria-modal="true"
      aria-labelledby="mapPreviewTitle"
    >
      <div class="overlay-modal-inner">
        <div class="overlay-modal-head">
          <h3 id="mapPreviewTitle">地図</h3>
          <button
            type="button"
            class="overlay-modal-close"
            id="mapPreviewClose"
            aria-label="Close map preview"
          >
            x
          </button>
        </div>
        <div class="overlay-map-stage" id="mapPreviewStage">
          <img id="mapPreviewImage" class="overlay-image" src="" alt="Stop map preview" />
        </div>
        <div class="overlay-map-controls">
          <button type="button" class="overlay-map-btn" id="mapZoomOut" aria-label="地図を縮小">−</button>
          <button type="button" class="overlay-map-btn" id="mapZoomReset" aria-label="地図をリセット">100%</button>
          <button type="button" class="overlay-map-btn" id="mapZoomIn" aria-label="地図を拡大">＋</button>
        </div>
      </div>
    </section>

    <section
      class="overlay-modal hidden"
      id="termModal"
      role="dialog"
      aria-modal="true"
      aria-labelledby="termModalTitle"
    >
      <div class="overlay-modal-inner term-modal-inner">
        <div class="overlay-modal-head">
          <h3 id="termModalTitle">Keyword</h3>
          <button
            type="button"
            class="overlay-modal-close"
            id="termModalClose"
            aria-label="Close keyword details"
          >
            x
          </button>
        </div>
        <div class="term-modal-scroll" id="termModalScroll">
          <div id="termGalleryMeta" class="term-gallery-meta hidden">
            <span id="termGalleryCount" class="term-gallery-count">1 / 1</span>
            <div id="termGalleryDots" class="term-gallery-dots" aria-label="Image position"></div>
          </div>
          <div id="termModalMedia" class="term-modal-media hidden"></div>
          <div id="termModalBody" class="term-modal-body"></div>
        </div>
      </div>
    </section>

    <footer class="site-footer" aria-label="Site footer">
      <p>Memorial Tour Guide &middot; SmartSenior</p>
    </footer>

    <script src="./script.js"></script>
  </body>
</html>
