<!doctype html>
<!-- Entry page: language/font settings plus the intro experience before the tour starts. -->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#08080c" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>Tour Entry · Stop 0</title>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .getRegistrations()
            .then((registrations) =>
              Promise.all(
                registrations.map((registration) => registration.unregister()),
              ),
            )
            .catch(() => {});
          if ("caches" in window) {
            caches
              .keys()
              .then((keys) =>
                Promise.all(keys.map((key) => caches.delete(key))),
              )
              .catch(() => {});
          }
        });
      }
    </script>
    <link rel="icon" href="./assets/icons/icon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow:wght@500;700;800&family=Manrope:wght@500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./assets/css/entry.css?v=20260421f" />
  </head>
  <body>
    <!-- Settings screen (shown first) -->
    <div
      id="settingsScreen"
      class="settings-screen"
      role="dialog"
      aria-modal="true"
      aria-label="Preferences"
    >
      <div class="settings-inner">
        <div class="settings-card">
          <div
            class="settings-lang-grid"
            id="settingsLangGrid"
            role="group"
            aria-label="Select language"
          >
            <button
              class="settings-lang-btn is-active"
              type="button"
              data-lang="ja"
              aria-pressed="true"
            >
              <span class="settings-lang-flag">🇯🇵</span>
              <span class="settings-lang-name">日本語</span>
            </button>
            <button
              class="settings-lang-btn"
              type="button"
              data-lang="en"
              aria-pressed="false"
            >
              <span class="settings-lang-flag">🇬🇧</span>
              <span class="settings-lang-name">English</span>
            </button>
          </div>

          <div class="settings-font-row" role="group" aria-label="文字サイズ">
            <button class="settings-font-btn" type="button" data-size="small" aria-pressed="false">
              <span class="settings-font-sample">あ</span>
              <span class="settings-font-label">小</span>
            </button>
            <button class="settings-font-btn" type="button" data-size="normal" aria-pressed="false">
              <span class="settings-font-sample">あ</span>
              <span class="settings-font-label">中</span>
            </button>
            <button class="settings-font-btn is-active" type="button" data-size="large" aria-pressed="true">
              <span class="settings-font-sample">あ</span>
              <span class="settings-font-label">大</span>
            </button>
          </div>

          <ul class="settings-notices-list">
            <li class="settings-notice-item">
              <span class="settings-notice-icon" aria-hidden="true">📵</span>
              <span class="settings-notice-text" data-t="notice-photo">墓石や位牌の撮影はご遠慮ください。</span>
            </li>
            <li class="settings-notice-item">
              <span class="settings-notice-icon" aria-hidden="true">🤫</span>
              <span class="settings-notice-text" data-t="notice-quiet">見学中は静かにお話しください。</span>
            </li>
            <li class="settings-notice-item">
              <span class="settings-notice-icon" aria-hidden="true">🚭</span>
              <span class="settings-notice-text" data-t="notice-smoke">境内での喫煙は禁止されています。</span>
            </li>
            <li class="settings-notice-item">
              <span class="settings-notice-icon" aria-hidden="true">🐕</span>
              <span class="settings-notice-text" data-t="notice-pets">ペットの境内への持ち込みはご遠慮ください。</span>
            </li>
            <li class="settings-notice-item">
              <span class="settings-notice-icon" aria-hidden="true">🌿</span>
              <span class="settings-notice-text" data-t="notice-plants">花や植物を摘まないようにお願いします。</span>
            </li>
          </ul>

          <button
            class="settings-confirm-btn"
            id="settingsConfirmBtn"
            type="button"
          >
            <span data-t="confirm-btn">ガイド開始</span>
          </button>
        </div>
      </div>
    </div>

    <!-- Main entry layout for stop 0 video, summary text, and the Start Tour action. -->
    <main class="entry-shell" aria-label="Stop 0 entry page">
      <div
        id="entryLoadingOverlay"
        class="entry-loading-overlay"
        role="status"
        aria-label="Loading"
      >
        <div class="entry-loading-dots" aria-hidden="true">
          <span class="loading-dot"></span>
          <span class="loading-dot"></span>
          <span class="loading-dot"></span>
        </div>
      </div>

      <section class="entry-hero" aria-label="Stop 0 introduction video">
        <video
          id="entryVideo"
          class="entry-video hidden"
          playsinline
          autoplay
          muted
          preload="auto"
          x-webkit-airplay="deny"
          disableremoteplayback
          aria-label="Stop 0 video"
        ></video>
        <button
          class="entry-unmute-btn hidden"
          id="entryUnmuteBtn"
          type="button"
          aria-label="音声をオン/オフ"
        >
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            aria-hidden="true"
          >
            <path
              id="entryUnmuteIcon"
              d="M11 5L6 9H2v6h4l5 4V5zM23 9l-6 6M17 9l6 6"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
          <span id="entryUnmuteLabel">音声オン</span>
        </button>
        <button
          class="entry-settings-btn"
          id="entrySettingsBtn"
          type="button"
          aria-label="設定を開く"
        >
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <circle cx="12" cy="12" r="3" />
            <path
              d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"
            />
          </svg>
        </button>
      </section>

      <section
        class="entry-content"
        aria-label="Stop 0 description and transcript"
      >
        <h1 id="entryTitle">Welcome</h1>
        <p class="entry-highlight-label" id="entryHighlightLabel" hidden>
          ハイライト
        </p>
        <div id="entryHighlight" class="entry-highlight hidden"></div>
        <div id="entryText" class="entry-text"></div>

        <div
          id="entryGuideGallery"
          class="entry-guide-gallery hidden"
          aria-hidden="true"
        >
          <div id="entryGuideTrack" class="entry-guide-track"></div>
        </div>
      </section>

      <footer class="entry-footer">
        <div class="entry-actions">
          <button
            id="entryStartBtn"
            class="entry-action-btn is-start"
            type="button"
            aria-label="ガイドを開始"
          >
            ガイド開始
          </button>
        </div>
      </footer>
    </main>

    <script src="./assets/js/entry.js?v=20260421f"></script>
  </body>
</html>
